<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>
    <style>
        body { font-family: Arial; }
        #messages { list-style: none; padding: 0; }
        li { padding: 5px 0; }
    </style>
</head>
<body>

<h2>💬 Chat</h2>

<select id="roomSelect">
    <option value="general">Общий чат</option>
    <option value="room1">Комната 1</option>
    <option value="room2">Комната 2</option>
</select>

<ul id="messages"></ul>

<form id="form">
    <input id="input" autocomplete="off" placeholder="Напиши сообщение..." />
    <button>Отправить</button>
</form>

<!-- socket -->
<script src="/socket.io/socket.io.js"></script>

<script>
    const socket = io();

    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const messages = document.getElementById("messages");
    const roomSelect = document.getElementById("roomSelect");

    // подключение
    socket.on("connect", () => {
      console.log("✅ Socket подключен");
      socket.emit("joinRoom", roomSelect.value);
    });

    // смена комнаты
    roomSelect.addEventListener("change", () => {
      messages.innerHTML = "";
      socket.emit("joinRoom", roomSelect.value);
    });

    // загрузка сообщений
    socket.on("loadMessages", (msgs) => {
      messages.innerHTML = "";
      msgs.forEach(addMessage);
    });

    // новое сообщение
    socket.on("chatMessage", (msg) => {
      addMessage(msg);
    });

    // отправка
    form.addEventListener("submit", (e) => {
      e.preventDefault();

      if (input.value) {
        socket.emit("chatMessage", input.value);
        input.value = "";
      }
    });

    // отображение
    function addMessage(msg) {
      const item = document.createElement("li");
      item.textContent = msg.text;
      messages.appendChild(item);
    }
</script>

</body>
</html>
